<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Markdown Editor</title>
<style>
:root {
    --bg: #ffffff;
    --text: #222222;
    --muted-text: #555555;
    --header-bg: #f5f5f5;
    --button-bg: #ffffff;
    --button-hover-bg: #eeeeee;
    --button-active-bg: #dfefff;
    --button-active-border: #6da8e8;
    --editor-bg: #ffffff;
    --preview-bg: #fafafa;
    --border: #cccccc;
}

body.dark {
    --bg: #1e1e1e;
    --text: #dddddd;
    --muted-text: #aaaaaa;
    --header-bg: #252526;
    --button-bg: #2d2d30;
    --button-hover-bg: #3a3a3d;
    --button-active-bg: #0e3a5b;
    --button-active-border: #4aa3df;
    --editor-bg: #1e1e1e;
    --preview-bg: #202020;
    --border: #3c3c3c;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.header {
    height: 52px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    border-bottom: solid 1px var(--border);
    background: var(--header-bg);
    box-sizing: border-box;
    flex-shrink: 0;
}

.header-left,
.header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
}

.header-right {
    justify-content: flex-end;
}

.header-title {
    font-weight: bold;
    margin-right: 12px;
    white-space: nowrap;
}

.header button {
    padding: 6px 12px;
    cursor: pointer;
    border: solid 1px var(--border);
    border-radius: 6px;
    background: var(--button-bg);
    color: var(--text);
}

.header button:hover {
    background: var(--button-hover-bg);
}

.file-name {
    margin-left: 8px;
    color: var(--muted-text);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.view-toggle-bar {
    display: flex;
    align-items: center;
    gap: 10px;
}

.icon-button {
    width: 38px;
    height: 34px;
    padding: 0 !important;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: solid 1px var(--border);
    border-radius: 8px;
    background: var(--button-bg);
    color: var(--text);
}

.icon-button:hover {
    background: var(--button-hover-bg);
}

.icon-button.active {
    background: var(--button-active-bg);
    border-color: var(--button-active-border);
}

.icon-button svg {
    width: 24px;
    height: 24px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
}

.view-toggle-label {
    font-size: 12px;
    color: var(--muted-text);
    white-space: nowrap;
}

.container {
    display: flex;
    flex: 1;
    min-height: 0;
}

#editor,
#preview {
    width: 50%;
    padding: 20px;
    box-sizing: border-box;
    overflow: auto;
}

#editor {
    resize: none;
    border: none;
    border-right: solid 1px var(--border);
    font-size: 16px;
    font-family: Consolas, monospace;
    outline: none;
    background: var(--editor-bg);
    color: var(--text);
}

#preview {
    background: var(--preview-bg);
    color: var(--text);
}

#preview a {
    color: inherit;
}

/* 表示切替 */
.container.editor-only #editor {
    width: 100%;
    border-right: none;
}

.container.editor-only #preview {
    display: none;
}

.container.preview-only #editor {
    display: none;
}

.container.preview-only #preview {
    width: 100%;
}

#fileOpen {
    display: none;
}
</style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="header-title">Markdown Editor</div>
        <button id="openButton" type="button">開く Ctrl+O</button>
        <button id="saveButton" type="button">保存 Ctrl+S</button>
        <span id="fileName" class="file-name">未保存</span>
        <input type="file" id="fileOpen" accept=".md,.markdown,text/markdown,text/plain">
    </div>

    <div class="view-toggle-bar" aria-label="表示切替">
        <button id="editorToggleButton" class="icon-button" type="button" title="Editorを大きく / 左右表示に戻す" aria-label="Editorを大きく">
            <!-- Editor拡大アイコン：左ペインを広げる -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <line x1="10" y1="5" x2="10" y2="19"></line>
                <path d="M8 12H4"></path>
                <path d="M6 10L4 12L6 14"></path>
                <path d="M13 9H18"></path>
                <path d="M13 12H18"></path>
                <path d="M13 15H16"></path>
            </svg>
        </button>
        <span class="view-toggle-label">表示切替</span>
        <button id="previewToggleButton" class="icon-button" type="button" title="Viewを大きく / 左右表示に戻す" aria-label="Viewを大きく">
            <!-- View拡大アイコン：右ペインを広げる -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                <line x1="14" y1="5" x2="14" y2="19"></line>
                <path d="M16 12H20"></path>
                <path d="M18 10L20 12L18 14"></path>
                <path d="M6 9H11"></path>
                <path d="M6 12H11"></path>
                <path d="M6 15H9"></path>
            </svg>
        </button>
    </div>

    <div class="header-right">
        <button id="themeToggleButton" class="icon-button" type="button" title="ダークモード切替" aria-label="ダークモード切替">
            <svg id="themeIconMoon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3A7 7 0 1 0 21 14.5Z"></path>
            </svg>
            <svg id="themeIconSun" viewBox="0 0 24 24" aria-hidden="true" style="display: none;">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2V4"></path>
                <path d="M12 20V22"></path>
                <path d="M4.93 4.93L6.34 6.34"></path>
                <path d="M17.66 17.66L19.07 19.07"></path>
                <path d="M2 12H4"></path>
                <path d="M20 12H22"></path>
                <path d="M4.93 19.07L6.34 17.66"></path>
                <path d="M17.66 6.34L19.07 4.93"></path>
            </svg>
        </button>
    </div>
</header>

<div id="container" class="container">
    <textarea id="editor"></textarea>
    <div id="preview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const container = document.getElementById("container");
const editor = document.getElementById("editor");
const preview = document.getElementById("preview");
const openButton = document.getElementById("openButton");
const saveButton = document.getElementById("saveButton");
const editorToggleButton = document.getElementById("editorToggleButton");
const previewToggleButton = document.getElementById("previewToggleButton");
const fileOpen = document.getElementById("fileOpen");
const fileName = document.getElementById("fileName");
const themeToggleButton = document.getElementById("themeToggleButton");
const themeIconMoon = document.getElementById("themeIconMoon");
const themeIconSun = document.getElementById("themeIconSun");

let currentFileName = "markdown.md";
let currentViewMode = "both";
let syncingScroll = false;

function applyTheme(theme) {
    const isDark = theme === "dark";
    document.body.classList.toggle("dark", isDark);
    themeIconMoon.style.display = isDark ? "none" : "block";
    themeIconSun.style.display = isDark ? "block" : "none";
    themeToggleButton.title = isDark ? "ライトモードに切替" : "ダークモードに切替";
    localStorage.setItem("markdownEditorTheme", theme);
}

function toggleTheme() {
    const isDark = document.body.classList.contains("dark");
    applyTheme(isDark ? "light" : "dark");
}

function updatePreview() {
    const editorScrollRatio = getScrollRatio(editor);
    preview.innerHTML = marked.parse(editor.value);
    setScrollRatio(preview, editorScrollRatio);
}

function getScrollRatio(element) {
    const maxScroll = element.scrollHeight - element.clientHeight;
    if (maxScroll <= 0) return 0;
    return element.scrollTop / maxScroll;
}

function setScrollRatio(element, ratio) {
    const maxScroll = element.scrollHeight - element.clientHeight;
    element.scrollTop = maxScroll > 0 ? maxScroll * ratio : 0;
}

function syncScroll(source, target) {
    if (syncingScroll) return;

    syncingScroll = true;
    setScrollRatio(target, getScrollRatio(source));

    window.requestAnimationFrame(() => {
        syncingScroll = false;
    });
}

function setViewMode(mode) {
    currentViewMode = mode;
    container.classList.remove("editor-only", "preview-only");
    editorToggleButton.classList.remove("active");
    previewToggleButton.classList.remove("active");

    if (mode === "editor") {
        container.classList.add("editor-only");
        editorToggleButton.classList.add("active");
    }

    if (mode === "preview") {
        container.classList.add("preview-only");
        previewToggleButton.classList.add("active");
    }
}

function toggleEditorView() {
    setViewMode(currentViewMode === "editor" ? "both" : "editor");
}

function togglePreviewView() {
    setViewMode(currentViewMode === "preview" ? "both" : "preview");
}

function openMarkdownFile(file) {
    if (!file) return;

    const name = file.name.toLowerCase();
    if (!(name.endsWith(".md") || name.endsWith(".markdown"))) {
        alert("Markdownファイル(.md / .markdown)を選択してください。");
        return;
    }

    const reader = new FileReader();
    reader.onload = () => {
        editor.value = reader.result;
        currentFileName = file.name;
        fileName.textContent = file.name;
        updatePreview();
        editor.scrollTop = 0;
        preview.scrollTop = 0;
    };
    reader.readAsText(file, "UTF-8");
}

function saveMarkdownFile() {
    const blob = new Blob([editor.value], { type: "text/markdown;charset=utf-8" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = currentFileName || "markdown.md";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    URL.revokeObjectURL(url);
}

editor.addEventListener("input", updatePreview);

editor.addEventListener("scroll", () => {
    syncScroll(editor, preview);
});

preview.addEventListener("scroll", () => {
    syncScroll(preview, editor);
});

openButton.addEventListener("click", () => {
    fileOpen.click();
});

saveButton.addEventListener("click", saveMarkdownFile);
themeToggleButton.addEventListener("click", toggleTheme);
editorToggleButton.addEventListener("click", toggleEditorView);
previewToggleButton.addEventListener("click", togglePreviewView);

fileOpen.addEventListener("change", e => {
    openMarkdownFile(e.target.files[0]);
    fileOpen.value = "";
});

// Ctrl+O / Ctrl+S 対応
window.addEventListener("keydown", e => {
    if (!e.ctrlKey) return;

    const key = e.key.toLowerCase();

    if (key === "o") {
        e.preventDefault();
        fileOpen.click();
    }

    if (key === "s") {
        e.preventDefault();
        saveMarkdownFile();
    }
});

// Markdownファイルのドラッグ&ドロップ
["dragenter", "dragover", "dragleave", "drop"].forEach(eventName => {
    document.addEventListener(eventName, e => {
        e.preventDefault();
        e.stopPropagation();
    });
});

document.addEventListener("drop", e => {
    openMarkdownFile(e.dataTransfer.files[0]);
});

// 初期表示：テーマ復元 + 左右表示
applyTheme(localStorage.getItem("markdownEditorTheme") || "light");
setViewMode("both");
editor.value = `# Markdown

- Hello
- World

**Bold**

## スクロール確認用

1. 1行目
2. 2行目
3. 3行目
4. 4行目
5. 5行目
6. 6行目
7. 7行目
8. 8行目
9. 9行目
10. 10行目
11. 11行目
12. 12行目
13. 13行目
14. 14行目
15. 15行目
20. 20行目
30. 30行目
40. 40行目
50. 50行目
`;

updatePreview();
</script>

</body>
</html>
