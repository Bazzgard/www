<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Viewer</title>
<style>
:root {
    --bg: #ffffff;
    --text: #111827;
    --muted: #6b7280;
    --toolbar-bg: #f8fafc;
    --editor-bg: #ffffff;
    --preview-bg: #ffffff;
    --border: #d1d5db;
    --button-bg: transparent;
    --button-hover: #e5e7eb;
    --button-active: #dbeafe;
    --shadow: rgba(0, 0, 0, 0.08);
    --link: #2563eb;
    --code-bg: #f3f4f6;
}

body.dark {
    --bg: #1e1e1e;
    --text: #d4d4d4;
    --muted: #9ca3af;
    --toolbar-bg: #252526;
    --editor-bg: #1e1e1e;
    --preview-bg: #1e1e1e;
    --border: #3c3c3c;
    --button-bg: transparent;
    --button-hover: #333333;
    --button-active: #0f3a5e;
    --shadow: rgba(0, 0, 0, 0.35);
    --link: #60a5fa;
    --code-bg: #2d2d2d;
}

* {
    box-sizing: border-box;
}

html,
body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body {
    display: flex;
    flex-direction: column;
}

.toolbar {
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 2px var(--shadow);
    flex: 0 0 auto;
}

.toolbar-left,
.toolbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
}

.file-name {
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 42vw;
    padding-left: 4px;
}

.toolbar-separator {
    width: 1px;
    height: 20px;
    background: var(--border);
}

.icon-button,
.mode-button {
    height: 30px;
    border: 1px solid transparent;
    border-radius: 6px;
    background: var(--button-bg);
    color: var(--text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 9px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
}

.icon-button:hover,
.mode-button:hover {
    background: var(--button-hover);
    border-color: var(--border);
}

.icon-button:active,
.mode-button:active {
    background: var(--button-active);
}

.icon-button svg,
.mode-button svg {
    width: 17px;
    height: 17px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex: 0 0 auto;
}

.theme-button {
    width: 32px;
    padding: 0;
}

.mode-menu-wrap {
    position: relative;
}

.mode-menu {
    position: absolute;
    right: 0;
    top: 34px;
    min-width: 132px;
    background: var(--toolbar-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 8px 24px var(--shadow);
    padding: 4px;
    display: none;
    z-index: 10;
}

.mode-menu.open {
    display: block;
}

.mode-menu button {
    width: 100%;
    height: 30px;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    text-align: left;
    padding: 0 10px;
    cursor: pointer;
    font-size: 13px;
}

.mode-menu button:hover {
    background: var(--button-hover);
}

.mode-menu button.active {
    background: var(--button-active);
}

.container {
    display: flex;
    height: calc(100vh - 40px);
    min-height: 0;
}

#editor,
#preview {
    width: 50%;
    height: 100%;
    padding: 24px;
    overflow: auto;
}

#editor {
    resize: none;
    border: none;
    border-right: 1px solid var(--border);
    outline: none;
    background: var(--editor-bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.65;
    font-family: Consolas, "Courier New", monospace;
}

#preview {
    background: var(--preview-bg);
    color: var(--text);
    font-size: 16px;
    line-height: 1.7;
}

#preview h1,
#preview h2,
#preview h3 {
    line-height: 1.25;
}

#preview a {
    color: var(--link);
}

#preview pre,
#preview code {
    background: var(--code-bg);
    border-radius: 4px;
}

#preview code {
    padding: 2px 4px;
}

#preview pre {
    padding: 12px;
    overflow: auto;
}

#preview pre code {
    padding: 0;
    background: transparent;
}

#preview blockquote {
    margin-left: 0;
    padding-left: 14px;
    border-left: 4px solid var(--border);
    color: var(--muted);
}

#preview table {
    border-collapse: collapse;
}

#preview th,
#preview td {
    border: 1px solid var(--border);
    padding: 6px 10px;
}

body.mode-editor #editor {
    width: 100%;
    border-right: none;
}

body.mode-editor #preview {
    display: none;
}

body.mode-preview #editor {
    display: none;
}

body.mode-preview #preview {
    width: 100%;
}

.hidden-input {
    display: none;
}

.drag-over #editor,
.drag-over #preview {
    outline: 2px dashed var(--link);
    outline-offset: -8px;
}

@media (max-width: 720px) {
    .file-name {
        max-width: 28vw;
    }

    .button-label {
        display: none;
    }

    #editor,
    #preview {
        padding: 16px;
    }
}
</style>
</head>
<body>
<header class="toolbar">
    <div class="toolbar-left">
        <button id="openSaveButton" class="icon-button" type="button" title="Open (Ctrl+O)">
            <svg id="openSaveIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"></path>
                <path d="M2 10h20"></path>
            </svg>
            <span id="openSaveLabel" class="button-label">Open</span>
        </button>
        <span id="fileName" class="file-name">README.md</span>
    </div>

    <div class="toolbar-right">
        <div class="mode-menu-wrap">
            <button id="modeButton" class="mode-button" type="button" title="Display mode">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                    <path d="M12 4v16"></path>
                </svg>
                <span id="modeLabel">Split</span>
                <svg viewBox="0 0 24 24" aria-hidden="true" style="width:14px;height:14px;">
                    <path d="m6 9 6 6 6-6"></path>
                </svg>
            </button>
            <div id="modeMenu" class="mode-menu">
                <button type="button" data-mode="split" class="active">Split</button>
                <button type="button" data-mode="editor">Editor</button>
                <button type="button" data-mode="preview">Preview</button>
            </div>
        </div>

        <button id="themeButton" class="icon-button theme-button" type="button" title="Toggle dark mode">
            <svg id="themeIcon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.5 6.5 0 0 0 21 12.8Z"></path>
            </svg>
        </button>
    </div>
</header>

<input id="fileInput" class="hidden-input" type="file" accept=".md,.markdown,text/markdown,text/plain">

<div class="container">
    <textarea id="editor" spellcheck="false"></textarea>
    <div id="preview"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function () {
    const editor = document.getElementById("editor");
    const preview = document.getElementById("preview");
    const fileInput = document.getElementById("fileInput");
    const openSaveButton = document.getElementById("openSaveButton");
    const openSaveLabel = document.getElementById("openSaveLabel");
    const openSaveIcon = document.getElementById("openSaveIcon");
    const fileName = document.getElementById("fileName");
    const modeButton = document.getElementById("modeButton");
    const modeMenu = document.getElementById("modeMenu");
    const modeLabel = document.getElementById("modeLabel");
    const themeButton = document.getElementById("themeButton");
    const themeIcon = document.getElementById("themeIcon");

    let currentFileName = "README.md";
    let hasOpenedFile = false;
    let currentMode = "split";
    let syncingScroll = false;

    const initialMarkdown = "# Markdown Viewer\n\n左側でMarkdownを編集し、右側でプレビューできます。\n\n- ファイルをドラッグ＆ドロップして開く\n- Ctrl+Oで開く\n- Ctrl+Sで保存\n- Split / Editor / Preview を切り替え\n";

    function render() {
        preview.innerHTML = marked.parse(editor.value);
    }

    function setOpenSaveState() {
        fileName.textContent = currentFileName;

        if (hasOpenedFile) {
            openSaveLabel.textContent = "Save";
            openSaveButton.title = "Save (Ctrl+S)";
            openSaveIcon.innerHTML = '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8"></path>';
        } else {
            openSaveLabel.textContent = "Open";
            openSaveButton.title = "Open (Ctrl+O)";
            openSaveIcon.innerHTML = '<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"></path><path d="M2 10h20"></path>';
        }
    }

    function openFilePicker() {
        fileInput.value = "";
        fileInput.click();
    }

    function isMarkdownFile(file) {
        const name = file.name.toLowerCase();
        return name.endsWith(".md") || name.endsWith(".markdown") || file.type === "text/markdown" || file.type === "text/plain";
    }

    function loadFile(file) {
        if (!file) return;
        if (!isMarkdownFile(file)) {
            alert("Markdownファイル(.md / .markdown)を選択してください。");
            return;
        }

        const reader = new FileReader();
        reader.onload = function () {
            editor.value = String(reader.result || "");
            currentFileName = file.name || "markdown.md";
            hasOpenedFile = true;
            setOpenSaveState();
            render();
        };
        reader.readAsText(file, "UTF-8");
    }

    function saveAsDownload() {
        const blob = new Blob([editor.value], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = currentFileName || "markdown.md";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    }

    function setMode(mode) {
        currentMode = mode;
        document.body.classList.toggle("mode-editor", mode === "editor");
        document.body.classList.toggle("mode-preview", mode === "preview");
        modeLabel.textContent = mode === "split" ? "Split" : mode === "editor" ? "Editor" : "Preview";

        modeMenu.querySelectorAll("button[data-mode]").forEach(button => {
            button.classList.toggle("active", button.dataset.mode === mode);
        });
    }

    function setTheme(theme) {
        const isDark = theme === "dark";
        document.body.classList.toggle("dark", isDark);
        localStorage.setItem("markdown-viewer-theme", theme);
        themeButton.title = isDark ? "Light mode" : "Dark mode";
        themeIcon.innerHTML = isDark
            ? '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>'
            : '<path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.5 6.5 0 0 0 21 12.8Z"></path>';
    }

    function syncScroll(source, target) {
        if (syncingScroll || currentMode !== "split") return;
        syncingScroll = true;

        const sourceMax = source.scrollHeight - source.clientHeight;
        const targetMax = target.scrollHeight - target.clientHeight;
        const ratio = sourceMax > 0 ? source.scrollTop / sourceMax : 0;
        target.scrollTop = targetMax * ratio;

        window.requestAnimationFrame(() => {
            syncingScroll = false;
        });
    }

    editor.addEventListener("input", render);

    editor.addEventListener("scroll", () => syncScroll(editor, preview));
    preview.addEventListener("scroll", () => syncScroll(preview, editor));

    openSaveButton.addEventListener("click", () => {
        if (hasOpenedFile) {
            saveAsDownload();
        } else {
            openFilePicker();
        }
    });

    fileInput.addEventListener("change", event => {
        loadFile(event.target.files[0]);
    });

    modeButton.addEventListener("click", event => {
        event.stopPropagation();
        modeMenu.classList.toggle("open");
    });

    modeMenu.addEventListener("click", event => {
        const button = event.target.closest("button[data-mode]");
        if (!button) return;
        setMode(button.dataset.mode);
        modeMenu.classList.remove("open");
    });

    document.addEventListener("click", () => {
        modeMenu.classList.remove("open");
    });

    themeButton.addEventListener("click", () => {
        const nextTheme = document.body.classList.contains("dark") ? "light" : "dark";
        setTheme(nextTheme);
    });

    document.addEventListener("keydown", event => {
        const key = event.key.toLowerCase();
        if ((event.ctrlKey || event.metaKey) && key === "o") {
            event.preventDefault();
            openFilePicker();
        }
        if ((event.ctrlKey || event.metaKey) && key === "s") {
            event.preventDefault();
            saveAsDownload();
        }
    });

    ["dragenter", "dragover"].forEach(eventName => {
        document.addEventListener(eventName, event => {
            event.preventDefault();
            document.body.classList.add("drag-over");
        });
    });

    ["dragleave", "drop"].forEach(eventName => {
        document.addEventListener(eventName, event => {
            event.preventDefault();
            document.body.classList.remove("drag-over");
        });
    });

    document.addEventListener("drop", event => {
        const file = event.dataTransfer.files[0];
        loadFile(file);
    });

    editor.value = initialMarkdown;
    setOpenSaveState();
    setMode("split");
    setTheme(localStorage.getItem("markdown-viewer-theme") || "light");
    render();
})();
</script>
</body>
</html>
